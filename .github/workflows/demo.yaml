name: Deploy website

on:
  push:
    branches: [main]

jobs:

  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Get code
  #       uses: actions/checkout@v6
  #     - name: Install dependencies
  #       run: npm ci
  #     - name: Test code
  #       run: npm run test

  build:
    # needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Publish JS filesname
        id: publish
        run: FILE=$(find dist/assets/*.js -type f -exec basename {} \;)
          echo "script-file=$FILE" >> $GITHUB_OUTPUT
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist
          # path: |
          #   dist  
          #   package.json

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
      - name: Output artifact contents
        run: ls
      - name: Deploy
        run: echo "Deploying..."
